<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALOA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&family=Ledger&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  <link rel="stylesheet" href="style/nav.css">
  <link rel="stylesheet" href="style/cadastro.css">
</head>
<body>
  <nav class="navbar navbar-default">
    <div class="container-fluid">
      <div>
        <ul class="nav navbar-nav navbar-right espacamento-direita">
          <li><a href="home.html">Home</a></li>
          <li><a class="active" href="cadastro.html">Cadastro</a></li>
          <li><a href="unidades.html">Unidades</a></li>
        </ul>
      </div>
    </div>
  </nav>
      
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h1 class="titulo" >Insira seus dados:</h1>
      </div>
    </div>  
    <div class="row">
      <div class="col-md-12">
        <form action="" class="form-horizontal">
          <div class="form-group">
            <label for="nome" class="col-md-2 form-titulo">Nome:</label>
            <div class="col-md-10">
              <input type="text" class="form-control" id="nome">
            </div>
          </div>
          <div class="form-group">
            <div class="col-md-2 informacao-cadastro">
              <label for="sobrenome">Sobrenome:</label>
            </div>
            <div class="col-md-10">
              <input type="text" id="sobrenome" class="form-control">
            </div>
          </div>
          <div class="form-group">
            <div class="col-md-2">
              <label for="nascimento">Nascimento:</label>
            </div>
            <div class="col-md-10">
              <input type="text" id="nascimento" class="form-control">
            </div>
          </div>
          <div class="form-group">
            <div class="col-md-2">
              <label for="cpf">CPF:</label>
            </div>
            <div class="col-md-10">
              <input type="text" id="cpf" class="form-control">
            </div>
          </div>
          <div class="form-group">
            <div class="col-md-2">
              <label for="cep">CEP:</label>
            </div>
            <div class="col-md-10">
              <input type="text" id="cep" class="form-control">
            </div>
          </div>
          <div class="form-group">
            <div class="col-md-2">
              <label for="telefone">Telefone:</label>
            </div>
            <div class="col-md-10">
              <input type="text" id="telefone" class="form-control">
            </div>
          </div>
          <div class="form-group">
            <div class="col-md-12">
              <label for="unidade">Unidade onde quer realizar a matrícula:</label>
            </div>
          </div>
        <div class="form-group">
          <div class="col-md-10">
            <select name="selecione" id="selecione">
              <option value="" selected hidden></option>
              <option value="1">Bigorrilho</option>
              <option value="2">Mercês</option>
              <option value="3">Batel</option>
              <option value="4">Alto da XV</option>
            </select>
          </div>
        </div> 
          <div class="form-group">
            <div class="col-md-12">
              <button type="submit" class="btn btn-default">Enviar</button>
            </div>
          </div>
          
        </form>
      </div>
    </div>
     
    
    <div class="row"></div>
  </div>
</body>
</html>
